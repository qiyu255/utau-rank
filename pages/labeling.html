                            hoveredHandle === 'nw' || hoveredHandle === 'se' ? 'nwse-resize' : 'nesw-resize';
                } else if (hit && !hit.locked) {
                    canvas.style.cursor = 'move';
                } else if (currentTool === 'select') {
                    canvas.style.cursor = 'default';
                } else {
                    canvas.style.cursor = 'crosshair';
                }
                updateStatusBar();
            });

            canvas.addEventListener('mouseup', function (e) {
                if (isPanning) {
                    isPanning = false;
                    canvas.style.cursor = spaceHeld ? 'grab' : (currentTool === 'select' ? 'default' : 'crosshair');
                    render();
                    return;
                }
                if (isDraggingAnno) {
                    isDraggingAnno = false;
                    dragAnnoId = null;
                    dragStartAnno = null;
                    isAltDragCopy = false;
                    updateAnnotationList();
                    updatePropsPanel();
                    render();
                    return;
                }
                if (isResizing) {
                    isResizing = false;
                    resizeAnnoId = null;
                    resizeHandle = '';
                    resizeStartAnno = null;
                    updateAnnotationList();
                    updatePropsPanel();
                    render();
                    return;
                }
                if (isMarqueeSelecting) {
                    isMarqueeSelecting = false;
                    const x1 = Math.min(marqueeStartX, marqueeCurrentX);
                    const y1 = Math.min(marqueeStartY, marqueeCurrentY);
                    const w = Math.abs(marqueeCurrentX - marqueeStartX);
                    const h = Math.abs(marqueeCurrentY - marqueeStartY);
                    if (w > 3 || h > 3) {
                        const imgTL = screenToImage(x1, y1);
                        const imgBR = screenToImage(x1 + w, y1 + h);
                        const selRect = {
                            x: Math.min(imgTL.x, imgBR.x),
                            y: Math.min(imgTL.y, imgBR.y),
                            w: Math.abs(imgBR.x - imgTL.x),
                            h: Math.abs(imgBR.y - imgTL.y)
                        };
                        if (!e.shiftKey) selectedIds.clear();
                        annotations.forEach(a => {
                            if (a.locked || !a.visible) return;
                            if (a.x < selRect.x + selRect.w && a.x + a.w > selRect.x && a.y < selRect.y + selRect
                                .h && a.y + a.h > selRect.y) {
                                selectedIds.add(a.id);
                            }
                        });
                        updateAnnotationList();
                        updatePropsPanel();
                    }
                    render();
                    return;
                }
                if (isDrawing && drawMode === 1) {
                    const pos = getCanvasPos(e);
                    const imgPos = screenToImage(pos.x, pos.y);
                    const x1 = Math.min(drawStartX, imgPos.x);
                    const y1 = Math.min(drawStartY, imgPos.y);
                    const w = Math.abs(imgPos.x - drawStartX);
                    const h = Math.abs(imgPos.y - drawStartY);
                    const anno = createAnnotation(x1, y1, w, h);
                    isDrawing = false;
                    drawPhaseOne = false;
                    if (anno) {
                        selectedIds.clear();
                        selectedIds.add(anno.id);
                        updateAnnotationList();
                        updatePropsPanel();
                    }
                    render();
                }
            });

            canvas.addEventListener('wheel', function (e) {
                e.preventDefault();
                const pos = getCanvasPos(e);
                const factor = e.deltaY < 0 ? 1.1 : 0.9;
                zoomAt(pos.x, pos.y, factor);
            });

            canvas.addEventListener('contextmenu', function (e) {
                e.preventDefault();
                if (drawPhaseOne) {
                    drawPhaseOne = false;
                    isDrawing = false;
                    render();
                }
            });

            canvas.addEventListener('dblclick', function (e) {
                if (drawPhaseOne && currentTool !== 'select') {
                    const pos = getCanvasPos(e);
                    const imgPos = screenToImage(pos.x, pos.y);
                    const x1 = Math.min(drawStartX, imgPos.x);
                    const y1 = Math.min(drawStartY, imgPos.y);
                    const w = Math.abs(imgPos.x - drawStartX);
                    const h = Math.abs(imgPos.y - drawStartY);
                    const anno = createAnnotation(x1, y1, w, h);
                    drawPhaseOne = false;
                    isDrawing = false;
                    if (anno) {
                        selectedIds.clear();
                        selectedIds.add(anno.id);
                        updateAnnotationList();
                        updatePropsPanel();
                    }
                    render();
                }
            });

            // 触屏事件
            canvas.addEventListener('touchstart', function (e) {
                e.preventDefault();
                const rect = canvas.getBoundingClientRect();
                if (e.touches.length === 2) {
                    if (drawPhaseOne) {
                        drawPhaseOne = false;
                        isDrawing = false;
                        render();
                    }
                    isPanning = false;
                    isDraggingAnno = false;
                    isResizing = false;
                    isMarqueeSelecting = false;
                    isDrawing = false;
                    return;
                }
                const touch = e.touches[0];
                const pos = { x: touch.clientX - rect.left, y: touch.clientY - rect.top };
                const imgPos = screenToImage(pos.x, pos.y);
                lastMouseScreenX = pos.x;
                lastMouseScreenY = pos.y;
                if (currentTool === 'select') {
                    const hit = findAnnotationAtImg(imgPos.x, imgPos.y);
                    if (hit && !hit.locked) {
                        selectedIds.clear();
                        selectedIds.add(hit.id);
                        isDraggingAnno = true;
                        dragAnnoId = hit.id;
                        dragStartAnno = annotations.map(a => ({ ...a }));
                        dragStartMouseImg = { x: imgPos.x, y: imgPos.y };
                        pushUndo();
                        updateAnnotationList();
                        updatePropsPanel();
                        render();
                        return;
                    }
                }
                if (currentTool === 'smart') {
                    const hit = findAnnotationAtImg(imgPos.x, imgPos.y);
                    if (hit && !hit.locked) {
                        selectedIds.clear();
                        selectedIds.add(hit.id);
                        isDraggingAnno = true;
                        dragAnnoId = hit.id;
                        dragStartAnno = annotations.map(a => ({ ...a }));
                        dragStartMouseImg = { x: imgPos.x, y: imgPos.y };
                        pushUndo();
                        updateAnnotationList();
                        updatePropsPanel();
                        render();
                        return;
                    }
                }
                if (drawMode === 1) {
                    isDrawing = true;
                    drawStartX = imgPos.x;
                    drawStartY = imgPos.y;
                    drawCurrentX = imgPos.x;
                    drawCurrentY = imgPos.y;
                    selectedIds.clear();
                    updateAnnotationList();
                    updatePropsPanel();
                    pushUndo();
                } else {
                    if (!drawPhaseOne) {
                        drawPhaseOne = true;
                        isDrawing = true;
                        drawStartX = imgPos.x;
                        drawStartY = imgPos.y;
                        drawCurrentX = imgPos.x;
                        drawCurrentY = imgPos.y;
                        selectedIds.clear();
                        updateAnnotationList();
                        updatePropsPanel();
                    } else {
                        const x1 = Math.min(drawStartX, imgPos.x);
                        const y1 = Math.min(drawStartY, imgPos.y);
                        const w = Math.abs(imgPos.x - drawStartX);
                        const h = Math.abs(imgPos.y - drawStartY);
                        const anno = createAnnotation(x1, y1, w, h);
                        drawPhaseOne = false;
                        isDrawing = false;
                        if (anno) {
                            selectedIds.clear();
                            selectedIds.add(anno.id);
                            updateAnnotationList();
                            updatePropsPanel();
                        }
                        render();
                    }
                }
            });

            canvas.addEventListener('touchmove', function (e) {
                e.preventDefault();
                if (e.touches.length === 2) return;
                const touch = e.touches[0];
                const rect = canvas.getBoundingClientRect();
                const pos = { x: touch.clientX - rect.left, y: touch.clientY - rect.top };
                const imgPos = screenToImage(pos.x, pos.y);
                lastMouseScreenX = pos.x;
                lastMouseScreenY = pos.y;
                if (isDraggingAnno && dragAnnoId !== null) {
                    const dx = imgPos.x - dragStartMouseImg.x;
                    const dy = imgPos.y - dragStartMouseImg.y;
                    const movedIds = new Set();
                    if (selectedIds.has(dragAnnoId)) {
                        selectedIds.forEach(id => {
                            const a = annotations.find(a => a.id === id);
                            if (a && !a.locked) movedIds.add(id);
                        });
                    } else { movedIds.add(dragAnnoId); }
                    movedIds.forEach(id => {
                        const a = annotations.find(a => a.id === id);
                        const orig = dragStartAnno.find(o => o.id === id);
                        if (a && orig) {
                            let nx = orig.x + dx;
                            let ny = orig.y + dy;
                            const snapped = snapPosition(nx, ny, id);
                            const clamped = clampPositionKeepSize(snapped.x, snapped.y, orig.w, orig.h);
                            a.x = clamped.x;
                            a.y = clamped.y;
                            a.w = orig.w;
                            a.h = orig.h;
                        }
                    });
                    updateAnnotationList();
                    updatePropsPanel();
                    render();
                }
                if (isDrawing && (drawPhaseOne || drawMode === 1)) {
                    drawCurrentX = imgPos.x;
                    drawCurrentY = imgPos.y;
                    render();
                }
            });

            canvas.addEventListener('touchend', function (e) {
                e.preventDefault();
                if (isDraggingAnno) {
                    isDraggingAnno = false;
                    dragAnnoId = null;
                    dragStartAnno = null;
                    isAltDragCopy = false;
                    updateAnnotationList();
                    updatePropsPanel();
                    render();
                }
                if (isDrawing && drawMode === 1) {
                    const x1 = Math.min(drawStartX, drawCurrentX);
                    const y1 = Math.min(drawStartY, drawCurrentY);
                    const w = Math.abs(drawCurrentX - drawStartX);
                    const h = Math.abs(drawCurrentY - drawStartY);
                    const anno = createAnnotation(x1, y1, w, h);
                    isDrawing = false;
                    if (anno) {
                        selectedIds.clear();
                        selectedIds.add(anno.id);
                        updateAnnotationList();
                        updatePropsPanel();
                    }
                    render();
                }
            });

            // ---------- 键盘事件 ----------
            document.addEventListener('keydown', function (e) {
                if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT' || e.target.tagName ===
                    'TEXTAREA') return;
                const key = e.key.toLowerCase();
                if (key === ' ') {
                    e.preventDefault();
                    spaceHeld = true;
                    if (!isPanning && !isDraggingAnno && !isResizing) {
                        canvas.style.cursor = 'grab';
                    }
                    return;
                }
                if (key === 'v' && !e.ctrlKey && !e.metaKey) setTool('select');
                if (key === 'b' && !e.ctrlKey && !e.metaKey) setTool('smart');
                if (key === 'd' && !e.ctrlKey && !e.metaKey) setTool('draw');
                if (key === 'escape') {
                    if (drawPhaseOne) {
                        drawPhaseOne = false;
                        isDrawing = false;
                        render();
                    }
                    if (isMarqueeSelecting) {
                        isMarqueeSelecting = false;
                        render();
                    }
                    selectedIds.clear();
                    updateAnnotationList();
                    updatePropsPanel();
                    render();
                }
                if (key === 'delete' || key === 'backspace') deleteSelectedAnnotations();
                if (e.ctrlKey && key === 'a') {
                    e.preventDefault();
                    selectAllAnnotations();
                }
                if (e.ctrlKey && key === 's') {
                    e.preventDefault();
                    saveROI();
                }
                if (e.ctrlKey && key === 'z' && !e.shiftKey) {
                    e.preventDefault();
                    undo();
                }
                if (e.ctrlKey && key === 'z' && e.shiftKey) {
                    e.preventDefault();
                    redo();
                }
                if (key === '+' || key === '=') zoomAt(canvas.width / 2, canvas.height / 2, 1.15);
                if (key === '-') zoomAt(canvas.width / 2, canvas.height / 2, 0.87);
                if (key === 'arrowleft') nudgeSelection(-1, 0);
                if (key === 'arrowright') nudgeSelection(1, 0);
                if (key === 'arrowup') nudgeSelection(0, -1);
                if (key === 'arrowdown') nudgeSelection(0, 1);
            });

            document.addEventListener('keyup', function (e) {
                if (e.key === ' ') {
                    spaceHeld = false;
                    if (!isPanning) {
                        canvas.style.cursor = currentTool === 'select' ? 'default' : 'crosshair';
                    }
                }
            });

            function setTool(tool) {
                currentTool = tool;
                drawPhaseOne = false;
                isDrawing = false;
                isMarqueeSelecting = false;
                document.getElementById('tool-smart').classList.toggle('active', tool === 'smart');
                document.getElementById('tool-select').classList.toggle('active', tool === 'select');
                document.getElementById('tool-draw').classList.toggle('active', tool === 'draw');
                canvas.style.cursor = tool === 'select' ? 'default' : 'crosshair';
                render();
                updateStatusBar();
            }

            function nudgeSelection(dx, dy) {
                if (selectedIds.size === 0) return;
                const step = parseInt(document.getElementById('nudge-step').value) || 1;
                const ndx = dx * step;
                const ndy = dy * step;
                pushUndo();
                selectedIds.forEach(id => {
                    const a = annotations.find(a => a.id === id);
                    if (a && !a.locked) {
                        a.x += ndx;
                        a.y += ndy;
                        const clamped = clampPositionKeepSize(a.x, a.y, a.w, a.h);
                        a.x = clamped.x;
                        a.y = clamped.y;
                    }
                });
                updateAnnotationList();
                updatePropsPanel();
                render();
            }

            function adjustSize(dim, delta) {
                if (selectedIds.size === 0) return;
                const step = parseInt(document.getElementById('nudge-step').value) || 1;
                const change = delta * step;
                pushUndo();
                selectedIds.forEach(id => {
                    const a = annotations.find(a => a.id === id);
                    if (a && !a.locked) {
                        if (dim === 'w') {
                            const newW = Math.max(1, a.w + change);
                            const clamped = clampToImage(a.x, a.y, newW, a.h);
                            a.w = clamped.w;
                            a.x = clamped.x;
                        } else if (dim === 'h') {
                            const newH = Math.max(1, a.h + change);
                            const clamped = clampToImage(a.x, a.y, a.w, newH);
                            a.h = clamped.h;
                            a.y = clamped.y;
                        }
                    }
                });
                updateAnnotationList();
                updatePropsPanel();
                render();
            }

            // ---------- 绑定UI控件 ----------
            document.getElementById('tool-smart').addEventListener('click', () => setTool('smart'));
            document.getElementById('tool-select').addEventListener('click', () => setTool('select'));
            document.getElementById('tool-draw').addEventListener('click', () => setTool('draw'));
            document.getElementById('display-both').addEventListener('click', function () {
                displayStyle = 'both';
                this.classList.add('active');
                document.getElementById('display-border').classList.remove('active');
                document.getElementById('display-mask').classList.remove('active');
                render();
            });
            document.getElementById('display-border').addEventListener('click', function () {
                displayStyle = 'border';
                this.classList.add('active');
                document.getElementById('display-both').classList.remove('active');
                document.getElementById('display-mask').classList.remove('active');
                render();
            });
            document.getElementById('display-mask').addEventListener('click', function () {
                displayStyle = 'mask';
                this.classList.add('active');
                document.getElementById('display-both').classList.remove('active');
                document.getElementById('display-border').classList.remove('active');
                render();
            });
            document.getElementById('mode-click').addEventListener('click', function () {
                drawMode = 0;
                this.classList.add('active');
                document.getElementById('mode-drag').classList.remove('active');
                drawPhaseOne = false;
                isDrawing = false;
                render();
            });
            document.getElementById('mode-drag').addEventListener('click', function () {
                drawMode = 1;
                this.classList.add('active');
                document.getElementById('mode-click').classList.remove('active');
                drawPhaseOne = false;
                isDrawing = false;
                render();
            });
            document.getElementById('btn-save').addEventListener('click', saveROI);
            document.getElementById('btn-undo').addEventListener('click', undo);
            document.getElementById('btn-redo').addEventListener('click', redo);
            document.getElementById('btn-fit').addEventListener('click', fitImage);
            document.getElementById('btn-zoom-in').addEventListener('click', () => zoomAt(canvas.width / 2, canvas
                .height / 2, 1.2));
            document.getElementById('btn-zoom-out').addEventListener('click', () => zoomAt(canvas.width / 2, canvas
                .height / 2, 0.83));
            document.getElementById('batch-select-all').addEventListener('click', selectAllAnnotations);
            document.getElementById('batch-deselect-all').addEventListener('click', () => {
                selectedIds.clear();
                updateAnnotationList();
                updatePropsPanel();
                render();
            });
            document.getElementById('batch-delete').addEventListener('click', deleteSelectedAnnotations);
            // 新增：批量复制按钮
            document.getElementById('batch-duplicate').addEventListener('click', batchDuplicateSelected);
            document.getElementById('batch-toggle-lock').addEventListener('click', () => {
                if (selectedIds.size === 0) return;
                pushUndo();
                const allLocked = Array.from(selectedIds).every(id => {
                    const a = annotations.find(a => a.id === id);
                    return a && a.locked;
                });
                const newLock = !allLocked;
                selectedIds.forEach(id => {
                    const a = annotations.find(a => a.id === id);
                    if (a) { a.locked = newLock; if (newLock) selectedIds.delete(id); }
                });
                updateAnnotationList();
                updatePropsPanel();
                render();
            });
            document.getElementById('batch-toggle-vis').addEventListener('click', () => {
                if (selectedIds.size === 0) return;
                pushUndo();
                const allVis = Array.from(selectedIds).every(id => {
                    const a = annotations.find(a => a.id === id);
                    return a && a.visible;
                });
                const newVis = !allVis;
                selectedIds.forEach(id => {
                    const a = annotations.find(a => a.id === id);
                    if (a) { a.visible = newVis; if (!newVis) selectedIds.delete(id); }
                });
                updateAnnotationList();
                updatePropsPanel();
                render();
            });
            document.getElementById('nudge-up').addEventListener('click', () => nudgeSelection(0, -1));
            document.getElementById('nudge-down').addEventListener('click', () => nudgeSelection(0, 1));
            document.getElementById('nudge-left').addEventListener('click', () => nudgeSelection(-1, 0));
            document.getElementById('nudge-right').addEventListener('click', () => nudgeSelection(1, 0));
            document.getElementById('nudge-w-plus').addEventListener('click', () => adjustSize('w', 1));
            document.getElementById('nudge-w-minus').addEventListener('click', () => adjustSize('w', -1));
            document.getElementById('nudge-h-plus').addEventListener('click', () => adjustSize('h', 1));
            document.getElementById('nudge-h-minus').addEventListener('click', () => adjustSize('h', -1));

            document.getElementById('prop-x').addEventListener('change', function () {
                const sel = getSingleSelectedAnnotation();
                if (sel) {
                    pushUndo();
                    sel.x = parseFloat(this.value) || 0;
                    updateAnnotationList();
                    render();
                }
            });
            document.getElementById('prop-y').addEventListener('change', function () {
                const sel = getSingleSelectedAnnotation();
                if (sel) {
                    pushUndo();
                    sel.y = parseFloat(this.value) || 0;
                    updateAnnotationList();
                    render();
                }
            });
            document.getElementById('prop-w').addEventListener('change', function () {
                const sel = getSingleSelectedAnnotation();
                if (sel) {
                    pushUndo();
                    sel.w = Math.max(1, parseFloat(this.value) || 1);
                    updateAnnotationList();
                    render();
                }
            });
            document.getElementById('prop-h').addEventListener('change', function () {
                const sel = getSingleSelectedAnnotation();
                if (sel) {
                    pushUndo();
                    sel.h = Math.max(1, parseFloat(this.value) || 1);
                    updateAnnotationList();
                    render();
                }
            });
            document.getElementById('prop-name').addEventListener('change', function () {
                const sel = getSingleSelectedAnnotation();
                if (sel) {
                    pushUndo();
                    sel.name = this.value;
                    updateAnnotationList();
                    render();
                }
            });

            sampleSelect.addEventListener('change', function () {
                const name = this.value;
                if (name && name !== currentSampleName) {
                    currentSampleName = name;
                    roiNameInput.value = name;
                    const sample = samples.find(s => s.name === name);
                    if (sample) loadImage(sample.url || sample.name);
                }
            });

            roiNameInput.addEventListener('change', function () {
                const name = this.value.trim();
                if (name) {
                    currentSampleName = name;
                    loadROI(name);
                }
            });

            window.addEventListener('resize', resizeCanvas);
            const ro = new ResizeObserver(() => resizeCanvas());
            ro.observe(workArea);

            document.addEventListener('click', function (e) {
                if (drawPhaseOne && !canvas.contains(e.target) && e.target !== canvas) {
                    drawPhaseOne = false;
                    isDrawing = false;
                    render();
                }
            });

            // ---------- 初始化 ----------
            buildColorPalette();
            resizeCanvas();
            loadSampleList();
            updateStatusBar();
            updatePropsPanel();
        })();
    </script>
</body>

</html>
