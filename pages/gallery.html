<!DOCTYPE html>
<html lang="zh-hans" data-theme="dark">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#282828" id="theme-color-meta">
    <title>图集操作工具</title>
    <meta name="description" content="图集筛选与标记工具">
    <script>
        (function () {
            const saved = localStorage.getItem('theme-preference');
            const systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            let resolvedTheme;
            let preference;

            if (saved === 'dark' || saved === 'light' || saved === 'auto') {
                preference = saved;
            } else {
                preference = 'auto';
            }

            if (preference === 'auto') {
                resolvedTheme = systemDark ? 'dark' : 'light';
            } else {
                resolvedTheme = preference;
            }

            document.documentElement.setAttribute('data-theme', resolvedTheme);
            document.documentElement.setAttribute('data-theme-preference', preference);

            const meta = document.getElementById('theme-color-meta');
            if (meta) {
                meta.setAttribute('content', resolvedTheme === 'dark' ? '#282828' : '#fbf1c7');
            }
        })();
    </script>
    <style>
        :root {
            --font-family:
                system-ui,
                -apple-system,
                BlinkMacSystemFont,
                "Segoe UI",
                Roboto,
                "Helvetica Neue",
                "Noto Sans",
                "Liberation Sans",
                "Apple Color Emoji",
                "Segoe UI Emoji",
                "Segoe UI Symbol",
                "Noto Color Emoji",
                "Source Han Sans VF",
                "Microsoft YaHei",
                "PingFang SC",
                "Hiragino Sans GB",
                "WenQuanYi Micro Hei",
                Arial,
                sans-serif;

            --font-family-monospace:
                "JetBrains Mono",
                "Liberation Mono",
                "SF Mono",
                Menlo,
                Monaco,
                Consolas,
                "Source Han Sans VF",
                "Microsoft YaHei",
                "PingFang SC",
                "Hiragino Sans GB",
                monospace;

            --transition-time: 0.2s;
            --transition-time-slow: 0.3s;
            --radius-sm: 2px;
            --radius-md: 4px;
            --breakpoint-sm: 576px;
            --breakpoint-md: 768px;
            --breakpoint-lg: 992px;
            --breakpoint-xl: 1200px;

            --color-primary: var(--green);
            --color-secondary: var(--yellow);
            --color-accent: var(--blue);
            --color-success: var(--green);
            --color-warning: var(--orange);
            --color-error: var(--red);
            --color-info: var(--blue);
            --text-primary: var(--fg1);
            --text-secondary: var(--fg-3);
            --text-muted: var(--fg4);
            --text-inverse: var(--bg1);
            --bg-body: var(--bg);
            --bg-surface: var(--bg-s);
            --bg-overlay: #0000007F;
            --font-size-xs: 0.75rem;
            --font-size-sm: 0.875rem;
            --font-size-base: 1rem;
            --font-size-md: 1.125rem;
            --font-size-lg: 1.25rem;
            --font-size-xl: 1.5rem;
            font-size: 16px;
        }

        [data-theme="dark"] {
            color-scheme: dark;
            --bg_h: #1d2021;
            --bg: #282828;
            --bg_s: #32302f;
            --bg1: #3c3836;
            --bg2: #504945;
            --bg3: #665c54;
            --bg4: #7c6f64;
            --fg: #fbf1c7;
            --fg1: #ebdbb2;
            --fg2: #d5c4a1;
            --fg3: #bdae93;
            --fg4: #a89984;
            --red: #fb4934;
            --green: #b8bb26;
            --yellow: #fabd2f;
            --blue: #83a598;
            --purple: #d3869b;
            --aqua: #8ec07c;
            --gray: #928374;
            --orange: #fe8019;
            --red-dim: #cc2412;
            --green-dim: #98971a;
            --yellow-dim: #d79921;
            --blue-dim: #458588;
            --purple-dim: #b16286;
            --aqua-dim: #689d6a;
            --gray-dim: #a89984;
            --orange-dim: #d65d0e;
        }

        [data-theme="light"] {
            color-scheme: light;
            --bg_h: #f9f5d7;
            --bg: #fbf1c7;
            --bg_s: #f2e5bc;
            --bg1: #ebdbb2;
            --bg2: #d5c4a1;
            --bg3: #bdae93;
            --bg4: #a89984;
            --fg: #282828;
            --fg1: #3c3836;
            --fg2: #504945;
            --fg3: #665c54;
            --fg4: #7c6f64;
            --red: #9d0006;
            --green: #79740e;
            --yellow: #b57614;
            --blue: #076678;
            --purple: #8f3f71;
            --aqua: #427b58;
            --orange: #af3a03;
            --gray: #928374;
            --red-dim: #cc2412;
            --green-dim: #98971a;
            --yellow-dim: #d79921;
            --blue-dim: #458598;
            --purple-dim: #b16286;
            --aqua-dim: #689d6a;
            --orange-dim: #d65d0e;
            --gray-dim: #7c6f64;
        }

        a {
            color: var(--blue);
            text-decoration: none;
            transition: color 0.2s ease;
        }

        a:hover {
            color: var(--blue-dim);
        }

        a:visited {
            color: var(--blue);
        }

        a:active {
            color: var(--blue);
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
            -webkit-text-size-adjust: 100%;
        }

        body {
            font-family: var(--font-family);
            background-color: var(--bg-body);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            line-height: 1.5;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        .app-toolbar {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            background-color: var(--bg_s);
            border-bottom: 1px solid var(--bg2);
            position: sticky;
            top: 0;
            z-index: 100;
            flex-wrap: wrap;
        }

        .toolbar-group {
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }

        .toolbar-spacer {
            flex-grow: 1;
        }

        .btn-text {
            font-family: inherit;
            font-size: var(--font-size-sm);
            color: var(--text-primary);
            background: none;
            border: none;
            padding: 0.375rem 0.625rem;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: color var(--transition-time) ease;
            line-height: 1;
        }

        .btn-text:hover {
            color: var(--fg4);
        }

        .btn-text:active {
            color: var(--fg3);
        }

        .btn-text.active {
            color: var(--color-primary);
        }

        .btn-text:focus-visible {
            outline: 2px solid var(--color-primary);
            outline-offset: 2px;
        }

        .btn-outline {
            font-family: inherit;
            font-size: var(--font-size-sm);
            color: var(--color-primary);
            background: none;
            border: 1px solid var(--color-primary);
            padding: 0.375rem 0.75rem;
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: background-color var(--transition-time) ease;
            line-height: 1;
        }

        .btn-outline:hover {
            background-color: var(--green-dim);
            color: var(--text-inverse);
        }

        .btn-outline:active {
            background-color: var(--color-primary);
            color: var(--text-inverse);
        }

        .btn-outline:focus-visible {
            outline: 2px solid var(--color-primary);
            outline-offset: 2px;
        }

        .dataset-select {
            font-family: inherit;
            font-size: var(--font-size-sm);
            color: var(--text-primary);
            background-color: var(--bg_s);
            border: 1px solid var(--bg2);
            padding: 0.375rem 0.625rem;
            border-radius: var(--radius-sm);
            cursor: pointer;
            line-height: 1;
            outline: none;
        }

        .dataset-select:focus-visible {
            outline: 2px solid var(--color-primary);
            outline-offset: 2px;
        }

        .dataset-select option {
            background-color: var(--bg_s);
            color: var(--text-primary);
        }

        .status-bar {
            font-size: var(--font-size-sm);
            color: var(--fg3);
            min-width: 8rem;
            text-align: right;
        }

        /* ===== 色块标记按钮 ===== */
        .color-swatch {
            width: 1.75rem;
            height: 1.75rem;
            border-radius: var(--radius-sm);
            border: 2px solid transparent;
            cursor: pointer;
            transition: transform var(--transition-time) ease, border-color var(--transition-time) ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: var(--font-size-xs);
            font-weight: bold;
            color: #fff;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.5);
            line-height: 1;
            padding: 0;
            background: none;
        }

        .color-swatch:hover {
            transform: scale(1.1);
        }

        .color-swatch.active {
            border-color: var(--fg1);
            transform: scale(1.15);
            box-shadow: 0 0 0 2px var(--bg_s), 0 0 0 4px var(--fg1);
        }

        .color-swatch .swatch-inner {
            width: 100%;
            height: 100%;
            border-radius: calc(var(--radius-sm) - 1px);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 橡皮擦图标 - CSS渐变绘制 */
        .eraser-btn {
            width: 1.75rem;
            height: 1.75rem;
            border-radius: var(--radius-sm);
            border: 2px solid var(--bg3);
            cursor: pointer;
            transition: transform var(--transition-time) ease, border-color var(--transition-time) ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            background: none;
            position: relative;
            overflow: hidden;
        }

        .eraser-btn:hover {
            transform: scale(1.1);
            border-color: var(--fg3);
        }

        .eraser-btn.active {
            border-color: var(--fg1);
            transform: scale(1.15);
            box-shadow: 0 0 0 2px var(--bg_s), 0 0 0 4px var(--fg1);
        }

        .eraser-icon {
            width: 1rem;
            height: 1rem;
            position: relative;
        }

        /* 橡皮擦主体 - 倾斜的矩形 */
        .eraser-icon::before {
            content: '';
            position: absolute;
            width: 70%;
            height: 55%;
            top: 10%;
            left: 15%;
            background: linear-gradient(180deg, #e8e8e8 0%, #d0d0d0 50%, #b8b8b8 100%);
            border-radius: 1px;
            transform: rotate(-15deg);
            border: 1px solid #999;
        }

        /* 橡皮擦擦除效果 - 斜线渐变 */
        .eraser-icon::after {
            content: '';
            position: absolute;
            width: 90%;
            height: 35%;
            bottom: 5%;
            left: 5%;
            background: repeating-linear-gradient(-45deg,
                    transparent,
                    transparent 2px,
                    var(--fg3) 2px,
                    var(--fg3) 3px);
            opacity: 0.6;
            border-radius: 1px;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 0;
            flex: 1;
            align-content: start;
        }

        .item {
            position: relative;
            overflow: hidden;
            cursor: pointer;
            outline: 3px solid transparent;
            outline-offset: -3px;
            transition: outline-color var(--transition-time) ease;
            background-color: var(--bg1);
            min-height: 120px;
        }

        .item img {
            width: 100%;
            height: auto;
            display: block;
            object-fit: contain;
        }

        /* 颜色标记边框 - 使用 CSS 变量 */
        .item.mark-red {
            outline-color: var(--red);
        }

        .item.mark-green {
            outline-color: var(--green);
        }

        .item.mark-blue {
            outline-color: var(--blue);
        }

        .item.mark-yellow {
            outline-color: var(--yellow);
        }

        .item.mark-purple {
            outline-color: var(--purple);
        }

        .item-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 0.375rem;
            opacity: 0;
            transition: opacity var(--transition-time) ease;
            background: var(--bg-overlay);
            pointer-events: none;
        }

        .item:hover .item-overlay,
        .item.active-overlay .item-overlay {
            opacity: 1;
            pointer-events: auto;
        }

        .overlay-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .frame-basename {
            font-family: var(--font-family-monospace);
            font-size: var(--font-size-xs);
            color: var(--fg);
            padding: 0.125rem 0.375rem;
            border-radius: var(--radius-sm);
            line-height: 1.4;
            max-width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .overlay-bottom {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.5rem;
        }

        .overlay-btn {
            font-family: inherit;
            font-size: var(--font-size-lg);
            color: var(--fg);
            background: none;
            border: none;
            cursor: pointer;
            padding: 0.25rem 0.5rem;
            border-radius: var(--radius-sm);
            transition: color var(--transition-time) ease, background-color var(--transition-time) ease;
            line-height: 1;
            min-width: 2rem;
            text-align: center;
        }

        .overlay-btn:hover {
            color: var(--color-primary);
            background-color: var(--bg2);
        }

        .overlay-btn.delete-btn:hover {
            color: var(--red);
        }

        .overlay-btn:focus-visible {
            outline: 2px solid var(--color-primary);
            outline-offset: 2px;
        }

        body.mark-mode .item {
            cursor: crosshair;
        }

        body.mark-mode .item-overlay {
            display: none;
        }

        @media (max-width: 576px) {
            .gallery {
                grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            }

            .app-toolbar {
                padding: 0.375rem 0.5rem;
            }
        }

        @media (min-width: 1200px) {
            .gallery {
                grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            }
        }
    </style>

<body>
    <div class="app-toolbar" id="toolbar">
        <div class="toolbar-group">
            <select id="dataset-select" class="dataset-select" onchange="changeDataset(this.value)"></select>
        </div>
        <div class="toolbar-group">
            <select id="prefix-select" class="dataset-select" onchange="changePrefix(this.value)"></select>
        </div>
        <div class="toolbar-group" id="color-toolbar">
            <!-- 色块按钮由 JS 动态生成 -->
        </div>
        <div class="toolbar-spacer"></div>
        <div class="status-bar" id="status"></div>
        <div class="toolbar-group">
            <button class="btn-outline" onclick="submitMarks()">提交</button>
        </div>
    </div>

    <div class="gallery" id="gallery"></div>

    <script>
        const items = [
            'ch03_dedup',
            'ch04_group_c0',
            'ch04_group_c1',
            'ch04_group_c2',
            'ch04_group_c3',
            'ch04_group_c4',
  
            'ch02_clean_miss_good',
            'ch02_clean_miss_bad',
            'ch01_clean_daekness_good',
            'ch01_clean_daekness_bad',
            // '00_good',
            // '00_miss',
            // '01_cluster',
            // '02_purified',
        ];
        let selected = 0;

        // ===== 可配置：图片 URL 前缀 =====
        const prefixes = [
            {name: 'default', baseURL: '/cache/frames'},
            {name: 'crush', baseURL: '/cache/crush-frames'},
            {name: 'purified', baseURL: '/cache/purified'},
            {name: 'sample', baseURL: '/cache/sample'},
        ];
        let currentPrefix = prefixes[1].baseURL;

        let data = [];
        let currentFilter = 'all';
        let markMode = false;
        let isPointerDown = false;
        let lastHoveredId = null;
        let statusTimer = null;
        let showAllFrames = false;

        // 颜色标记配置（使用主题 CSS 变量）
        const MARK_COLORS = [
            { key: 'red', cssVar: 'var(--red)', label: '红' },
            { key: 'green', cssVar: 'var(--green)', label: '绿' },
            { key: 'blue', cssVar: 'var(--blue)', label: '蓝' },
            { key: 'yellow', cssVar: 'var(--yellow)', label: '黄' },
            { key: 'purple', cssVar: 'var(--purple)', label: '紫' },
        ];
        let activeMarkColor = null; // null 表示未选中，'erase' 表示橡皮擦

        const galleryEl = document.getElementById('gallery');
        const statusEl = document.getElementById('status');
        const itemStates = new Map();

        function initDatasetSelect() {
            const select = document.getElementById('dataset-select');
            select.innerHTML = '';
            items.forEach(function (item, index) {
                const option = document.createElement('option');
                option.value = index;
                option.textContent = item;
                if (index === selected) option.selected = true;
                select.appendChild(option);
            });
        }

        function initPrefixSelect() {
            const select = document.getElementById('prefix-select');
            select.innerHTML = '';
            prefixes.forEach(function (prefix) {
                const option = document.createElement('option');
                option.value = prefix.baseURL;
                option.textContent = prefix.name;
                if (prefix.baseURL === currentPrefix) option.selected = true;
                select.appendChild(option);
            });
        }

        function initColorToolbar() {
            const toolbar = document.getElementById('color-toolbar');
            toolbar.innerHTML = '';

            MARK_COLORS.forEach(function (mc) {
                const btn = document.createElement('button');
                btn.className = 'color-swatch';
                btn.title = '标记' + mc.label + '色 (' + mc.key + ')';
                btn.dataset.color = mc.key;
                btn.innerHTML = '<span class="swatch-inner" style="background-color:' + mc.cssVar + '"></span>';
                btn.onclick = function () {
                    toggleMarkColor(mc.key);
                };
                toolbar.appendChild(btn);
            });

            // 橡皮擦
            const eraserBtn = document.createElement('button');
            eraserBtn.className = 'eraser-btn';
            eraserBtn.title = '清除标记 (橡皮擦)';
            eraserBtn.dataset.color = 'erase';
            eraserBtn.innerHTML = '<span class="eraser-icon"></span>';
            eraserBtn.onclick = function () {
                toggleMarkColor('erase');
            };
            toolbar.appendChild(eraserBtn);
        }

        function toggleMarkColor(colorKey) {
            if (activeMarkColor === colorKey) {
                activeMarkColor = null;
                markMode = false;
            } else {
                activeMarkColor = colorKey;
                markMode = true;
            }

            document.body.classList.toggle('mark-mode', markMode);

            // 更新按钮状态
            document.querySelectorAll('.color-swatch, .eraser-btn').forEach(function (btn) {
                btn.classList.toggle('active', btn.dataset.color === activeMarkColor);
            });

            if (activeMarkColor === 'erase') {
                showStatus('橡皮擦模式');
            } else if (activeMarkColor) {
                const c = MARK_COLORS.find(function (x) { return x.key === activeMarkColor; });
                showStatus('标记模式: ' + (c ? c.label : activeMarkColor));
            } else {
                showStatus('标记模式已关闭');
            }
        }

        function changeDataset(index) {
            selected = parseInt(index, 10);
            currentFilter = 'all';
            showAllFrames = false;
            activeMarkColor = null;
            markMode = false;
            document.body.classList.remove('mark-mode');
            init();
        }

        function changePrefix(baseURL) {
            currentPrefix = baseURL;
            // 刷新当前已渲染图片的 src
            const itemEls = galleryEl.querySelectorAll('.item');
            itemEls.forEach(function (el) {
                const id = parseInt(el.dataset.id, 10);
                const img = el.querySelector('img');
                img.src = getImageUrl(id);
            });
            showStatus('前缀已切换: ' + baseURL);
        }

        function isLowQuality(item) {
            return item.indicator && item.indicator.bad !== undefined && item.indicator.bad > 0.5;
        }

        async function init() {
            showStatus('初始化中...');
            try {
                const res = await fetch('/cache/result/' + items[selected] + '.json');
                if (!res.ok) throw new Error('加载失败: ' + res.status);
                data = await res.json();
                itemStates.clear();

                data.forEach(item => {
                    const bestIndex = item.frames.indexOf(item.best);
                    itemStates.set(item.id, {
                        id: item.id,
                        currentFrameIndex: bestIndex >= 0 ? bestIndex : 0,
                        markColor: null, // null | 'red' | 'green' | 'blue' | 'yellow' | 'purple'
                        frames: item.frames,
                        best: item.best,
                        indicator: item.indicator || {}
                    });
                });

                render();
                updateCounts();
                showStatus('初始化成功');
            } catch (e) {
                showStatus('初始化失败: ' + e.message);
                console.error(e);
            }
        }

        function getImageUrl(id, frameIndex) {
            const state = itemStates.get(id);
            const frame = state.frames[frameIndex !== undefined ? frameIndex : state.currentFrameIndex];
            return currentPrefix + '/' + frame;
        }

        function render() {
            galleryEl.innerHTML = '';

            const filtered = data.filter(item => {
                return true; // 目前不过滤，显示全部
            });

            filtered.forEach(item => {
                const state = itemStates.get(item.id);
                const framesToShow = showAllFrames ? state.frames : [state.best];

                framesToShow.forEach(function (frameName, frameIdx) {
                    const frameIndex = state.frames.indexOf(frameName);
                    const el = document.createElement('div');
                    el.className = 'item';
                    el.dataset.id = item.id;
                    el.dataset.frame = frameName;

                    if (state.markColor) {
                        el.classList.add('mark-' + state.markColor);
                    }

                    const img = document.createElement('img');
                    img.src = getImageUrl(item.id, frameIndex);
                    img.alt = frameName;
                    img.loading = 'lazy';
                    img.draggable = false;

                    const overlay = document.createElement('div');
                    overlay.className = 'item-overlay';

                    const top = document.createElement('div');
                    top.className = 'overlay-top';

                    const basenameEl = document.createElement('span');
                    basenameEl.className = 'frame-basename';
                    basenameEl.textContent = frameName.replace(/\.[^.]+$/, '');
                    basenameEl.dataset.id = item.id;
                    top.appendChild(basenameEl);

                    const delBtn = document.createElement('button');
                    delBtn.className = 'overlay-btn delete-btn';
                    delBtn.textContent = '\u2715';
                    delBtn.title = '标记红色';
                    delBtn.onclick = function (e) {
                        e.stopPropagation();
                        setMarkColor(item.id, 'red');
                    };
                    top.appendChild(delBtn);

                    const bottom = document.createElement('div');
                    bottom.className = 'overlay-bottom';

                    const prevBtn = document.createElement('button');
                    prevBtn.className = 'overlay-btn';
                    prevBtn.textContent = '\u2190';
                    prevBtn.title = '上一帧';
                    prevBtn.onclick = function (e) {
                        e.stopPropagation();
                        cycleFrame(item.id, -1);
                    };

                    const resetBtn = document.createElement('button');
                    resetBtn.className = 'overlay-btn';
                    resetBtn.textContent = '\u2606';
                    resetBtn.title = '恢复最佳帧';
                    resetBtn.onclick = function (e) {
                        e.stopPropagation();
                        resetFrame(item.id);
                    };

                    const nextBtn = document.createElement('button');
                    nextBtn.className = 'overlay-btn';
                    nextBtn.textContent = '\u2192';
                    nextBtn.title = '下一帧';
                    nextBtn.onclick = function (e) {
                        e.stopPropagation();
                        cycleFrame(item.id, 1);
                    };

                    bottom.appendChild(prevBtn);
                    bottom.appendChild(resetBtn);
                    bottom.appendChild(nextBtn);

                    overlay.appendChild(top);
                    overlay.appendChild(bottom);

                    el.appendChild(img);
                    el.appendChild(overlay);

                    el.addEventListener('click', function () {
                        if (markMode && activeMarkColor) {
                            if (activeMarkColor === 'erase') {
                                setMarkColor(item.id, null);
                            } else {
                                setMarkColor(item.id, activeMarkColor);
                            }
                        }
                    });

                    el.addEventListener('mousedown', function (e) {
                        if (markMode && activeMarkColor) {
                            e.preventDefault();
                            lastHoveredId = item.id;
                            if (activeMarkColor === 'erase') {
                                setMarkColor(item.id, null);
                            } else {
                                setMarkColor(item.id, activeMarkColor);
                            }
                        }
                    });

                    el.addEventListener('mouseenter', function () {
                        if (markMode && isPointerDown && activeMarkColor) {
                            if (lastHoveredId !== item.id) {
                                lastHoveredId = item.id;
                                if (activeMarkColor === 'erase') {
                                    setMarkColor(item.id, null);
                                } else {
                                    setMarkColor(item.id, activeMarkColor);
                                }
                            }
                        }
                    });

                    galleryEl.appendChild(el);
                });
            });
        }

        function setMarkColor(id, color) {
            const state = itemStates.get(id);
            state.markColor = color;

            const itemEls = galleryEl.querySelectorAll('[data-id="' + id + '"]');
            itemEls.forEach(function (el) {
                // 清除所有颜色标记类
                MARK_COLORS.forEach(function (mc) {
                    el.classList.remove('mark-' + mc.key);
                });
                if (color) {
                    el.classList.add('mark-' + color);
                }
            });

            updateCounts();
        }

        function cycleFrame(id, direction) {
            const state = itemStates.get(id);
            state.currentFrameIndex += direction;
            if (state.currentFrameIndex < 0) {
                state.currentFrameIndex = state.frames.length - 1;
            }
            if (state.currentFrameIndex >= state.frames.length) {
                state.currentFrameIndex = 0;
            }

            const itemEls = galleryEl.querySelectorAll('[data-id="' + id + '"]');
            itemEls.forEach(function (el) {
                const img = el.querySelector('img');
                const frameName = state.frames[state.currentFrameIndex];
                img.src = getImageUrl(id, state.currentFrameIndex);
                img.alt = frameName;
                const basenameEl = el.querySelector('.frame-basename');
                if (basenameEl) {
                    basenameEl.textContent = frameName.replace(/\.[^.]+$/, '');
                }
            });
        }

        function resetFrame(id) {
            const state = itemStates.get(id);
            const bestIndex = state.frames.indexOf(state.best);
            state.currentFrameIndex = bestIndex >= 0 ? bestIndex : 0;

            const itemEls = galleryEl.querySelectorAll('[data-id="' + id + '"]');
            itemEls.forEach(function (el) {
                const img = el.querySelector('img');
                const frameName = state.frames[state.currentFrameIndex];
                img.src = getImageUrl(id, state.currentFrameIndex);
                img.alt = frameName;
                const basenameEl = el.querySelector('.frame-basename');
                if (basenameEl) {
                    basenameEl.textContent = frameName.replace(/\.[^.]+$/, '');
                }
            });
        }

        function updateCounts() {
            // 更新每个色块的标记数量
            MARK_COLORS.forEach(function (mc) {
                const count = Array.from(itemStates.values()).filter(function (s) {
                    return s.markColor === mc.key;
                }).length;

                const btn = document.querySelector('.color-swatch[data-color="' + mc.key + '"]');
                if (btn) {
                    const inner = btn.querySelector('.swatch-inner');
                    if (count > 0) {
                        inner.textContent = count;
                    } else {
                        inner.textContent = '';
                    }
                }
            });
        }

        function showStatus(msg) {
            statusEl.textContent = msg;
            if (statusTimer) clearTimeout(statusTimer);
            if (msg) {
                statusTimer = setTimeout(function () {
                    if (statusEl.textContent === msg) {
                        statusEl.textContent = '';
                    }
                }, 5000);
            }
        }

        async function submitMarks() {
            const payload = [];
            itemStates.forEach(function (state) {
                payload.push({
                    id: state.id,
                    url: getImageUrl(state.id),
                    color: state.markColor || null
                });
            });

            showStatus('提交中...');
            try {
                const res = await fetch('/markframes', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                if (!res.ok) throw new Error('提交失败: ' + res.status);
                showStatus('提交成功');
            } catch (e) {
                showStatus('提交失败: ' + e.message);
                console.error(e);
            }
        }

        document.addEventListener('mousedown', function () {
            isPointerDown = true;
        });
        document.addEventListener('mouseup', function () {
            isPointerDown = false;
            lastHoveredId = null;
        });
        document.addEventListener('touchstart', function () {
            isPointerDown = true;
        }, { passive: true });
        document.addEventListener('touchend', function () {
            isPointerDown = false;
            lastHoveredId = null;
        });
        document.addEventListener('touchmove', function (e) {
            if (!markMode || !isPointerDown || !activeMarkColor) return;
            const touch = e.touches[0];
            const el = document.elementFromPoint(touch.clientX, touch.clientY);
            if (el) {
                const item = el.closest('.item');
                if (item) {
                    const id = parseInt(item.dataset.id, 10);
                    if (lastHoveredId !== id) {
                        lastHoveredId = id;
                        if (activeMarkColor === 'erase') {
                            setMarkColor(id, null);
                        } else {
                            setMarkColor(id, activeMarkColor);
                        }
                    }
                }
            }
        }, { passive: true });

        initDatasetSelect();
        initPrefixSelect();
        initColorToolbar();
        init();
    </script>
</body>

</html>
